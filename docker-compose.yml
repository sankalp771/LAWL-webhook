services:
  postgres:
    image: bitnami/postgresql:latest
    environment:
      POSTGRESQL_DATABASE: lawl_webhooks
      POSTGRESQL_USERNAME: lawl
      POSTGRESQL_PASSWORD: lawl
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/bitnami/postgresql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U lawl -d lawl_webhooks"]
      interval: 5s
      timeout: 5s
      retries: 10

  api:
    build: .
    command: npm run start:api
    ports:
      - "3000:3000"
    depends_on:
      postgres:
        condition: service_healthy
    env_file: .env

  worker:
    build: .
    command: npm run start:worker
    depends_on:
      postgres:
        condition: service_healthy
    env_file: .env

volumes:
  pgdata: